<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms Store</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0; font-family:'Roboto',sans-serif; background:#0d1117; color:white;
}
header {
  background:linear-gradient(90deg,#1f2433,#151822); padding:15px 30px; display:flex; justify-content: space-between; align-items:center; box-shadow:0 4px 8px rgba(0,0,0,0.5);
}
header h1 {margin:0; font-size:24px;}
#balanceHeader {
  font-weight:bold; background:#2b3348; padding:5px 12px; border-radius:8px; transition:0.3s;
}
nav button {
  margin-left:5px; padding:8px 15px; background:#2b3348; border:none; color:white; cursor:pointer; font-weight:600; border-radius:6px; transition:0.3s;
}
nav button:hover {background:#3c4660; transform:scale(1.05);}
.page{display:none; padding:20px;}
input,textarea,select{display:block; margin:10px 0; padding:10px; background:#1f2433; border:none; color:white; border-radius:6px; width:100%; max-width:300px;}
button{cursor:pointer; border-radius:6px; padding:8px 12px; transition:0.3s;}
button:hover{transform:scale(1.05);}
.card{
  background:linear-gradient(145deg,#1c2030,#151822); padding:20px; margin:10px 0; border-radius:12px; box-shadow:0 6px 12px rgba(0,0,0,0.5); transition:0.3s;
}
.card:hover{transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.7);}
.card button{margin-top:10px; background:#2b3348; color:white; font-weight:600;}
.card button:hover{background:#3c4660;}
table{width:100%; border-collapse:collapse; margin-top:15px;}
th,td{border:1px solid #3c4660; padding:8px;}
th{background:#2b3348;}
td{text-align:center;}
#chatbox{
  background:#1c2030; padding:10px; height:200px; overflow-y:auto; border-radius:10px; box-shadow:inset 0 2px 6px rgba(0,0,0,0.5);
}
#chatbox p{margin:5px 0;}
@keyframes coinPop{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login" class="page" style="display:block;">
<h1>Terms Store</h1>
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<h3>Or Sign Up</h3>
<input id="signupUser" placeholder="New Username">
<input id="signupPass" type="password" placeholder="New Password">
<button onclick="signup()">Create Account</button>
</section>

<!-- STORE -->
<div id="store" style="display:none;">
<header>
<h1>Terms Store</h1>
<div id="balanceHeader">COIN'S: 0</div>
<nav>
<button onclick="showPage('market')">Market</button>
<button onclick="showPage('sell')">Sell</button>
<button onclick="showPage('redeem')">Redeem</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('admin')">Admin</button>
<button onclick="logout()">Logout</button>
</nav>
</header>

<section id="market" class="page">
<h2>Marketplace</h2>
<input id="search" placeholder="Search listings" onkeyup="searchListings()">
<div id="listings"></div>
</section>

<section id="sell" class="page">
<h2>Create Listing</h2>
<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<select id="category"><option>Software</option><option>Game</option><option>Media</option><option>Other</option></select>
<input id="price" type="number" placeholder="Price (0=Free)" value="0">
<input id="url" placeholder="Download URL">
<button onclick="publish()">Publish</button>
</section>

<section id="redeem" class="page">
<h2>Redeem Key</h2>
<input id="key" placeholder="Enter key">
<button onclick="redeem()">Redeem</button>
<p id="balance">Balance: 0 COIN'S</p>
</section>

<section id="chat" class="page">
<h2>Chat</h2>
<div id="chatbox"></div>
<input id="message" placeholder="Message">
<button onclick="send()">Send</button>
</section>

<section id="admin" class="page">
<h2>Admin Panel</h2>
<div id="adminPanel"></div>
<button onclick="clearListings()">Delete All Listings</button>
<p id="adminNotice"></p>
</section>
</div>

<script>
// --- DATA ---
let users = JSON.parse(localStorage.getItem("users")||"[]")
let listings = JSON.parse(localStorage.getItem("listings")||"[]")
let keys = JSON.parse(localStorage.getItem("keys")||"[]")
let currentUser = localStorage.getItem("currentUser")||null
let balance = 0
let isAdmin = false
const adminUser="term/fail"
const adminPass="Grandma24"

// --- INIT ADMIN ---
if(!users.find(u=>u.user===adminUser)){
  users.push({user:adminUser,pass:adminPass,balance:10,lastLogin:null,purchased:[]})
  localStorage.setItem("users",JSON.stringify(users))
}

// --- SIGNUP ---
function signup(){
  let user=document.getElementById("signupUser").value.trim()
  let pass=document.getElementById("signupPass").value.trim()
  if(!user||!pass){alert("Enter username and password"); return;}
  if(users.find(u=>u.user===user)){alert("Username exists"); return;}
  users.push({user,pass,balance:10,lastLogin:null,purchased:[]})
  localStorage.setItem("users",JSON.stringify(users))
  alert("Account created with 10 COIN'S!")
}

// --- LOGIN ---
function login(){
  let user=document.getElementById("loginUser").value.trim()
  let pass=document.getElementById("loginPass").value.trim()
  let found=users.find(u=>u.user===user && u.pass===pass)
  if(!found && user===adminUser && pass===adminPass){
    currentUser=adminUser
    isAdmin=true
    found=users.find(u=>u.user===adminUser)
  }
  if(found){
    currentUser=user
    isAdmin = currentUser===adminUser
    if(!found.purchased) found.purchased=[]
    giveDailyCoins(found)
    balance = found.balance
    localStorage.setItem("currentUser",currentUser)
    document.getElementById("login").style.display="none"
    document.getElementById("store").style.display="block"
    showPage("market")
    renderListings()
    if(isAdmin) renderAdmin()
    updateBalanceUI()
  } else { alert("Invalid login") }
}

// --- DAILY COINS ---
function giveDailyCoins(userObj){
  let today = new Date().toDateString()
  if(userObj.lastLogin!==today){
    userObj.balance+=5
    userObj.lastLogin=today
    localStorage.setItem("users",JSON.stringify(users))
    coinPop()
    alert("You received 5 COIN'S for today!")
  }
}

// --- COIN POP ANIMATION ---
function coinPop(){
  let el=document.getElementById("balanceHeader")
  el.style.animation="coinPop 0.5s"
  setTimeout(()=>el.style.animation="",500)
}

// --- LOGOUT ---
function logout(){
  localStorage.removeItem("currentUser")
  location.reload()
}

// --- AUTO LOGIN ---
window.onload=function(){
  if(currentUser){
    let userObj=users.find(u=>u.user===currentUser)
    if(userObj){
      if(!userObj.purchased) userObj.purchased=[]
      balance = userObj.balance
      isAdmin = currentUser===adminUser
      document.getElementById("login").style.display="none"
      document.getElementById("store").style.display="block"
      renderListings()
      if(isAdmin) renderAdmin()
      updateBalanceUI()
    }
  }
}

// --- PAGE NAV ---
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none")
  document.getElementById(page).style.display="block"
}

// --- BALANCE UI ---
function updateBalanceUI(){
  document.getElementById("balanceHeader").innerText="COIN'S: "+balance
  document.getElementById("balance").innerText="Balance: "+balance+" COIN'S"
}

// --- LISTINGS ---
function publish(){
  let title=document.getElementById("title").value
  let desc=document.getElementById("desc").value
  let price=parseInt(document.getElementById("price").value)
  let url=document.getElementById("url").value
  listings.push({title,desc,price,url})
  localStorage.setItem("listings",JSON.stringify(listings))
  renderListings()
  alert("Listing published. Everyone can now see it!")
}

// --- RENDER LISTINGS ---
function renderListings(){
  let container=document.getElementById("listings")
  container.innerHTML=""
  let userObj=users.find(u=>u.user===currentUser)
  listings.forEach((l,i)=>{
    let priceText=l.price==0?"FREE":l.price+" COIN'S"
    let button=""
    if(l.price==0){
      button=`<a href="${l.url}" target="_blank"><button>Download</button></a>`
    } else if(userObj.purchased.includes(i)){
      button=`<a href="${l.url}" target="_blank"><button>Download</button></a>`
    } else {
      button=`<button onclick="buy(${i})">Buy for ${l.price} COIN'S</button>`
    }
    let card=document.createElement("div")
    card.className="card"
    card.innerHTML=`<h3>${l.title}</h3><p>${l.desc}</p><p>Price: ${priceText}</p>${button}`
    container.appendChild(card)
  })
}

// --- BUY ---
function buy(i){
  let item=listings[i]
  let userObj=users.find(u=>u.user===currentUser)
  if(userObj.purchased.includes(i)){
    alert("You already bought this item!")
    return
  }
  if(balance>=item.price){
    balance-=item.price
    userObj.balance=balance
    userObj.purchased.push(i)
    localStorage.setItem("users",JSON.stringify(users))
    updateBalanceUI()
    renderListings()
    alert("Purchase successful! Click 'Download' to get it.")
    coinPop()
  } else {alert("Not enough COIN'S")}
}

// --- REDEEM ---
function redeem(){
  let keyInput=document.getElementById("key").value.trim()
  let index=keys.findIndex(k=>k.code===keyInput)
  if(index!==-1){
    balance+=keys[index].value
    let userObj=users.find(u=>u.user===currentUser)
    userObj.balance=balance
    keys.splice(index,1)
    localStorage.setItem("keys",JSON.stringify(keys))
    localStorage.setItem("users",JSON.stringify(users))
    updateBalanceUI()
    coinPop()
    alert("Redeemed COIN'S successfully!")
  } else alert("Invalid key")
}

// --- ADMIN PANEL ---
function renderAdmin(){
  if(!isAdmin) return
  let panel=document.getElementById("adminPanel")
  let html="<h3>Users & Balances</h3><table><tr><th>Username</th><th>Balance</th><th>Purchased</th><th>Add COIN'S</th></tr>"
  users.forEach((u,i)=>{
    let purchasedCount=u.purchased?u.purchased.length:0
    html+=`<tr>
      <td>${u.user}</td>
      <td id="bal${i}">${u.balance}</td>
      <td>${purchasedCount}</td>
      <td><input id="wd${i}" type="number" placeholder="Amount">
      <button onclick="giveWD(${i})">Add</button></td>
    </tr>`
  })
  html+="</table>"
  html+=`<h3>Create Key</h3><input id="keyName" placeholder="Key code"><input id="keyValue" type="number" placeholder="COIN'S"><button onclick="createKey()">Create Key</button><h4>Active Keys</h4><ul id="keyList"></ul>`
  panel.innerHTML=html
  renderKeys()
}

function giveWD(i){
  let amt=parseInt(document.getElementById("wd"+i).value)
  if(isNaN(amt)||amt<=0){alert("Invalid amount");return;}
  users[i].balance+=amt
  localStorage.setItem("users",JSON.stringify(users))
  document.getElementById("bal"+i).innerText=users[i].balance
  if(users[i].user===currentUser) balance=users[i].balance
  updateBalanceUI()
  coinPop()
}

function createKey(){
  let code=document.getElementById("keyName").value.trim()
  let value=parseInt(document.getElementById("keyValue").value)
  if(!code || isNaN(value)||value<=0){alert("Invalid");return;}
  keys.push({code,value})
  localStorage.setItem("keys",JSON.stringify(keys))
  document.getElementById("keyName").value=""
  document.getElementById("keyValue").value=""
  renderKeys()
  alert("Key created: "+code)
}

function renderKeys(){
  let list=document.getElementById("keyList")
  list.innerHTML=""
  keys.forEach(k=>list.innerHTML+="<li>"+k.code+" → "+k.value+" COIN'S</li>")
}

// --- DELETE ALL LISTINGS ---
function clearListings(){
  if(!isAdmin) return alert("Admins only")
  listings=[]
  localStorage.setItem("listings",JSON.stringify(listings))
  renderListings()
  alert("All listings deleted")
}

// --- CHAT ---
function send(){
  let msg=document.getElementById("message").value
  let box=document.getElementById("chatbox")
  box.innerHTML+="<p><b>"+currentUser+":</b> "+msg+"</p>"
}

// --- SEARCH ---
function searchListings(){
  let q=document.getElementById("search").value.toLowerCase()
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(q)?"block":"none"
  })
}
</script>

</body>
</html>
